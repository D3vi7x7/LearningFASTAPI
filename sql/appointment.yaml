get_patient_visits: SELECT
  a.appointment_id,
  p.patient_id,
  p.name AS patient_name,
  d.doctor_id,
  d.name AS doctor_name,
  d.department,
  d.specialization,
  a.appointment_date,
  a.appointment_time,
  a.status,
  a.notes,
  a.diagnosis
  FROM appointments a
  JOIN patients p ON a.patient_id = p.patient_id
  JOIN doctors d ON a.doctor_id = d.doctor_id
  WHERE p.patient_id = :patient_id

create_appointment: INSERT INTO appointments
  (
  patient_id,
  doctor_id,
  appointment_date,
  appointment_time,
  status,
  notes,
  diagnosis
  )
  VALUES (?, ?, ?, ?, ?, ?, ?)

get_by_id: SELECT
  a.appointment_id,
  p.patient_id,
  p.name AS patient_name,
  d.doctor_id,
  d.name AS doctor_name,
  d.departmet,
  d.specialization,
  a.appointment_date,
  a.appointment_time,
  a.status,
  a.notes,
  a.diagnosis
  FROM appointments a
  JOIN patients p ON a.patient_id = p.patient_id
  JOIN doctors d ON a.doctor_id = d.doctor_id
  WHERE a.appointment_id = :appointment_id

update_appointment: UPDATE appointments
  SET {fields}
  WHERE appointment_id = ?
